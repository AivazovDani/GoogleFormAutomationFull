[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

; 1. Virtual display (fake screen on the server)
[program:xvfb]
command=Xvfb :99 -screen 0 1920x1080x24
autostart=true
autorestart=true
priority=1
stdout_logfile=/var/log/xvfb.log
stderr_logfile=/var/log/xvfb.log

; 2. x11vnc - exposes the virtual display as a VNC server
[program:x11vnc]
command=x11vnc -display :99 -nopw -listen localhost -xkb -forever
autostart=true
autorestart=true
priority=2
startsecs=2
stdout_logfile=/var/log/x11vnc.log
stderr_logfile=/var/log/x11vnc.log

; 3. noVNC - lets you view the VNC stream in your browser
[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autostart=true
autorestart=true
priority=3
startsecs=3
stdout_logfile=/var/log/novnc.log
stderr_logfile=/var/log/novnc.log

; 4. Flask app
[program:flask]
command=python app.py
directory=/app
autostart=true
autorestart=true
priority=4
startsecs=4
stdout_logfile=/var/log/flask.log
stderr_logfile=/var/log/flask.log
